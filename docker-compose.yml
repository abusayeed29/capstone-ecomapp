services:
  app:
    build: .
    container_name: group2-ecomapp
    ports:
      - "8080:80"
    env_file:
      - .env
    environment:
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ecom-app
      DB_USERNAME: root
      DB_PASSWORD: root123
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      - mysql
      - redis
    restart: unless-stopped

  worker:
    build: .
    container_name: group2-ecomapp-worker
    command: ["/usr/local/bin/worker.sh"]
    env_file:
      - .env
    environment:
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ecom-app
      DB_USERNAME: root
      DB_PASSWORD: root123
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      - mysql
      - redis
    restart: unless-stopped

  mysql:
    image: mysql:8.0
    container_name: group2-ecomapp-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ecom-app
      MYSQL_ROOT_PASSWORD: root123
    volumes:
      - mysql_data:/var/lib/mysql

  redis:
    image: redis:7-alpine
    container_name: group2-ecomapp-redis
    restart: unless-stopped

volumes:
  mysql_data:
